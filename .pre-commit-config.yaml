repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Cargo fmt
        entry: cargo fmt --all
        language: system
        pass_filenames: false

      - id: cargo-check
        name: Cargo check
        entry: cargo check --workspace
        language: system
        pass_filenames: false

      - id: cargo-build
        name: Cargo build
        entry: cargo build
        language: system
        pass_filenames: false

