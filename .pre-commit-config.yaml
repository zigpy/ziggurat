repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Cargo fmt
        entry: cargo fmt --all
        language: system
        pass_filenames: false

      - id: cargo-check
        name: Cargo check
        entry: cargo check --workspace
        language: system
        pass_filenames: false

      - id: cargo-build
        name: Cargo build
        entry: cargo build
        language: system
        pass_filenames: false

      - id: rust-clippy
        name: Cargo clippy
        entry: cargo clippy --all-targets --all-features -- -Dclippy::all -Dclippy::nursery
        language: system
        pass_filenames: false

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.25.2
    hooks:
      - id: zizmor
        args: ["--pedantic"]
