repos:
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: [
          "--ignore-words-list", "crate,inout",
        ]

  - repo: local
    hooks:
      - id: rust-linting
        name: Rust linting
        entry: cargo fmt --all
        language: system
        pass_filenames: false

