[package]
name = "ziggurat"
version = "0.0.1"
authors = []
edition = "2024"

[dependencies]
"aes" = "=0.9.0-pre.2"
"cbc" = "=0.2.0-pre.2"
"constant_time_eq" = "=0.3.1"
"hex-literal" = "=0.4.1"
"hex" = "=0.4.3"
"pcap-parser" = "=0.16.0"
"shellexpand" = "=3.1.0"
"inline_colorization" = "0.1.6"
derivative = "2.2.0"
crc_all = "0.2.2"
strum_macros = "0.26.4"
serial2-tokio = "0.1.14"
tokio = { version = "1.43.0", features = ["full"] }
log = "0.4.26"
env_logger = "0.11.6"
serial2 = "0.2.28"

[[bin]]
name = "ziggurat-pcap"
path = "src/tools/dump_pcap.rs"

[[bin]]
name = "ziggurat-capture"
path = "src/tools/packet_capture.rs"

[[bin]]
name = "ziggurat-sender"
path = "src/tools/packet_sender.rs"

[[bin]]
name = "ziggurat-network-sniffer"
path = "src/tools/network_sniffer.rs"

[dev-dependencies]
cargo-debug = "0.3.0"
rand = "0.8.5"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
